<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>고객센터 | 밀리의 서재</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="icon" href="assets/favicon.png"/>
  <script src="https://kit.fontawesome.com/fb31173d2f.js" crossorigin="anonymous"></script>
    <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    .send{
      padding: 9px;
      margin-top: 22px;
      border-radius: 15px;
      background-color: #2887ff;
      text-align: center;
      color: white;
    }

    .w-full .back{
      position: absolute;
      top: 36px;
      right: 40px;
    }
  </style>
</head>
<body class="bg-gray-50 h-screen m-0">
  <div class="flex items-center justify-center h-full">
    <div class="w-full max-w-3xl bg-white p-6 rounded-2xl shadow-md" style="position: relative;">
      <a href="index.html" class="back"><i class="fa-solid fa-arrow-left" style="color: #2476da;"></i></a>
      <h1 class="text-3xl font-bold mb-4 text-center">고객센터</h1>
      <div class="space-y-4">
        <p class="text-gray-700">
          안녕하세요! 문의 사항이나 불편한 점이 있으시면 언제든지 아래 연락처로 문의해주세요.
        </p>

        <div class="bg-gray-100 p-4 rounded-xl">
          <p><strong>이메일:</strong> support@example.com</p>
          <p><strong>전화번호:</strong> 080-1234-5678</p>
          <p><strong>운영시간:</strong> 평일 오전 9시 ~ 오후 6시</p>
        </div>

        <form class="space-y-4 mt-6">
          <div>
            <label for="name" class="block text-sm font-medium text-gray-700">이름</label>
            <input type="text" id="name" class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-xl" placeholder="이름 입력" />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">이메일</label>
            <input type="email" id="email" class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-xl" placeholder="you@example.com" />
          </div>

          <div>
            <label for="message" class="block text-sm font-medium text-gray-700">문의 내용</label>
            <textarea id="message" rows="4" class="w-full mt-1 px-4 py-2 border border-gray-300 rounded-xl" placeholder="문의 내용을 입력해주세요..."></textarea>
          </div>
        </form>

          <a href="index.html">
            <div class="send">
              문의하기
            </div>
          </a>
      </div>
    </div>
  </div>

  <!-- 여기에 추가 내용 넣어도 레이아웃에 영향 없음 -->
  <div class="mt-10 w-full text-center">
    
    <!-- 추가할 내용 여기에 작성하면 됨 -->
  </div>
</body>

</html>
